name: governance-ci-gate

on:
  pull_request:
    branches: [ main ]

jobs:
  governance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify lock manifest exists
        run: test -f governance/approval/LOCK_MANIFEST.json

      - name: Verify canonical checksums exist
        run: ls governance/approval/CANONICAL_CHECKSUMS_*.txt

      - name: Verify glossary consistency
        run: |
          jq . glossary.json > /dev/null
          grep '^### ' glossary.md | wc -l

      - name: Verify compliance artifacts present
        run: |
          test -f governance/compliance/COMPLIANCE_MATRIX.csv
          test -f governance/compliance/ISO_CROSSWALK.csv
          test -f governance/compliance/NIST_CROSSWALK.csv
