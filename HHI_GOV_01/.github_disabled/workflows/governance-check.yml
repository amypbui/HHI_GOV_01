---
name: governance-check

permissions:
  contents: read

"on":
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.lock"
      - "**/*.yml"
      - "**/*.yaml"
      - "governance/**"
      - "standards/**"
      - ".github/**"
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  governance-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enforce strict shell
        run: |
          set -euo pipefail

      - name: Run governance check
        run: |
          echo "Running governance checks..."
          # TODO: confirm canonical script path
          if [ -f scripts/governance-check.sh ]; then
            bash scripts/governance-check.sh
          else
            echo "ERROR: scripts/governance-check.sh not found"
            exit 1
          fi
